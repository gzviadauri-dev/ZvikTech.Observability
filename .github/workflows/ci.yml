name: CI/CD

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "develop"]

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for GitVersion / tag detection

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Company.Observability.sln

      - name: Build (Release)
        run: |
          dotnet build Company.Observability.sln \
            --configuration Release \
            --no-restore \
            -p:TreatWarningsAsErrors=true

      - name: Test with coverage
        run: |
          dotnet test Company.Observability.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: "./coverage/**/*.xml"

      - name: Coverage summary (Codecov — optional)
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true  # Don't fail CI if Codecov is not configured
        with:
          directory: ./coverage
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────────────
  pack:
    name: Pack NuGet
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Company.Observability.sln

      # Determine package version:
      #   - On a "v*" tag → use the tag (e.g. "1.2.3")
      #   - On branches → append a preview suffix with the short SHA
      - name: Compute package version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="1.0.0-preview.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Packaging version: ${VERSION}"

      - name: Pack Company.Observability
        run: |
          dotnet pack src/Company.Observability/Company.Observability.csproj \
            --configuration Release \
            --no-restore \
            /p:Version="${VERSION}" \
            --output ./artifacts

      - name: Upload .nupkg and .snupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          if-no-files-found: error

      - name: Upload symbol packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-symbols
          path: ./artifacts/*.snupkg
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to NuGet.org
    needs: pack
    runs-on: ubuntu-latest
    # Only publish on version tags (e.g. v1.2.3).
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget-release

    steps:
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download NuGet packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Download NuGet symbol packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-symbols
          path: ./artifacts

      - name: Push .nupkg to NuGet.org
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push .snupkg symbols to NuGet.org
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
        continue-on-error: true  # Symbol upload failure should not fail the release
